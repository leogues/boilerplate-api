name: Combined Analysis

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      ts: ${{ steps.changes.outputs.ts }}
      ts_files: ${{ steps.changes.outputs.ts_files }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          list-files: csv
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'biome.json'
            ts:
              - added|modified: 'src/**/*.ts'

  lint:
    name: Lint & Typecheck
    needs: detect-changes
    if: needs.detect-changes.outputs.src == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format)
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

  fta:
    name: FTA Complexity Analysis
    needs: detect-changes
    if: needs.detect-changes.outputs.ts == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Run FTA analysis
        run: npx fta-cli@3.0.0 src --json > fta-results.json

      - name: Generate report
        run: node .github/scripts/fta-prepare-data.mjs fta-results.json "${{ needs.detect-changes.outputs.ts_files }}" > fta-report.md

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: fta-report
          path: fta-report.md

